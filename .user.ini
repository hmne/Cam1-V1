; =============================================================================
; Camera Control - PHP Performance Configuration
; =============================================================================
; Place this file in your web root for PHP-FPM/CGI
; These settings override php.ini for this directory
; =============================================================================

; -----------------------------------------------------------------------------
; OPcache Settings (Critical for Performance)
; -----------------------------------------------------------------------------
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
opcache.max_wasted_percentage=10
opcache.validate_timestamps=0
opcache.revalidate_freq=0
opcache.fast_shutdown=1
opcache.enable_file_override=1
opcache.save_comments=0

; -----------------------------------------------------------------------------
; Realpath Cache (Reduces file system calls)
; -----------------------------------------------------------------------------
realpath_cache_size=4096K
realpath_cache_ttl=600

; -----------------------------------------------------------------------------
; Output Buffering
; -----------------------------------------------------------------------------
output_buffering=4096
implicit_flush=0
zlib.output_compression=On
zlib.output_compression_level=6

; -----------------------------------------------------------------------------
; Session Optimization
; -----------------------------------------------------------------------------
session.gc_maxlifetime=3600
session.cookie_httponly=1
session.cookie_samesite=Strict
session.use_strict_mode=1
session.use_only_cookies=1

; -----------------------------------------------------------------------------
; Error Handling (Production)
; -----------------------------------------------------------------------------
display_errors=Off
display_startup_errors=Off
log_errors=On
error_reporting=E_ALL

; -----------------------------------------------------------------------------
; Memory & Execution
; -----------------------------------------------------------------------------
memory_limit=128M
max_execution_time=30
max_input_time=30

; -----------------------------------------------------------------------------
; Upload Settings
; -----------------------------------------------------------------------------
upload_max_filesize=80M
post_max_size=85M
max_file_uploads=10

; -----------------------------------------------------------------------------
; Date/Time
; -----------------------------------------------------------------------------
date.timezone=Asia/Kuwait
